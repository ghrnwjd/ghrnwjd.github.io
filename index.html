<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>초대합니다.</title>

  <!-- 모바일 화면 대응 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* 기본 레이아웃 */
    body {
      margin: 0;
      padding: 20px;               
      background-color: #fff;      /* 배경을 흰색으로 변경 */
      display: flex;
      flex-direction: column;      
      align-items: center;         
      justify-content: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
      color: #000;                 /* 글자 색 검정 */
      font-family: sans-serif;
    }

    /* 이미지 스타일 */
    img, #map img {
      max-width: 100%;             
      height: auto;
      display: block;
      cursor: pointer;
      margin-bottom: 20px;
    }

    /* 지도 컨테이너 */
    #map {
      width: 100%;
      max-width: 504px;            
    }

    /* 지도 밑 안내 영역 */
    #map .hide {
      width: 100%;
      max-width: 482px;
      overflow: hidden;
      padding: 7px 11px;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 0 0 2px 2px;
      background-color: #f9f9f9;
      color: #000;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 모바일 대응 */
    @media (max-width: 480px) {
      #map {
        max-width: 100%;
      }
      #map .hide {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- 🔊 배경음 -->
  <audio id="bgm" muted loop>
    <source src="https://cdn.jsdelivr.net/gh/ghrnwjd/ghrnwjd.github.io/music mr.mp3" type="audio/mp3">
  </audio>

  <!-- 🖼️ 메인 이미지 -->
  <img src="https://raw.githubusercontent.com/ghrnwjd/ghrnwjd.github.io/refs/heads/main/sites_google_3.jpg" id="mainImage" alt="초대 이미지">

  <!-- 🗺️ 지도 -->
  <div id="map">
    <a href="https://map.kakao.com/?urlX=486785&urlY=1116781&urlLevel=3&map_type=TYPE_MAP&map_hybrid=false" target="_blank">
      <img width="504" height="310" src="https://staticmap.kakao.com/map/mapservice?FORMAT=PNG&SCALE=2.5&MX=486785&MY=1116780&S=0&IW=504&IH=310&LANG=0&COORDSTM=WCONGNAMUL&logo=kakao_logo" style="border:1px solid #ccc" alt="지도">
    </a>
    <div class="hide">
      <strong><img src="//t1.kakaocdn.net/localimg/localimages/07/2018/pc/common/logo_kakaomap.png" width="72" height="16" alt="카카오맵"></strong>
      <div>
        <a style="text-decoration:none;color:#000" target="_blank" href="https://map.kakao.com/?urlX=486785&urlY=1116781&urlLevel=3&map_type=TYPE_MAP&map_hybrid=false">
          지도 크게 보기
        </a>
      </div>
    </div>
  </div>

  <!-- 🎵 클릭 시 소리 켜기 -->
  <script>
  const audio = document.getElementById("bgm");

  // 이미지 클릭 시
  document.getElementById("mainImage").addEventListener("click", () => {
    if (audio.muted) {
      audio.muted = false;
      audio.play();
    }
  }, { once: true });

  // 페이지 스크롤 시 (모바일 포함)
  window.addEventListener("scroll", () => {
    if (audio.muted) {  // 아직 안 켜졌으면
      audio.muted = false;
      audio.play();
    }
  }, { once: true }); // 한 번만 실행
</script>

</body>
</html>
